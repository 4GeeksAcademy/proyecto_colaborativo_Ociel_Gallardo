<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maison Mode Paris | Catálogo</title>
    <meta
      name="description"
      content="Catálogo de Maison Mode Paris: filtra por categoría y talla y descubre nuestra colección completa."
    />
    <link rel="canonical" href="https://maisonmode.fr/catalogo.html" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="es_ES" />
    <meta property="og:site_name" content="Maison Mode Paris" />
    <meta property="og:title" content="Maison Mode Paris | Catálogo" />
    <meta property="og:description" content="Filtra por categoría y talla para descubrir nuestra colección completa." />
    <meta property="og:url" content="https://maisonmode.fr/catalogo.html" />
    <meta property="og:image" content="https://images.unsplash.com/photo-1529139574466-a303027c1d8b?auto=format&fit=crop&w=1200&q=80" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Maison Mode Paris | Catálogo" />
    <meta name="twitter:description" content="Colección completa de moda premium: calzado, camisas, pantalones y accesorios." />
    <meta name="twitter:image" content="https://images.unsplash.com/photo-1529139574466-a303027c1d8b?auto=format&fit=crop&w=1200&q=80" />
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap"
        rel="stylesheet"
      />
    </noscript>
    <link rel="stylesheet" href="css/tailwind.generated.css" />
    <link rel="stylesheet" href="css/custom-effects.css" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "BreadcrumbList",
        "itemListElement": [
          { "@type": "ListItem", "position": 1, "name": "Home", "item": "https://maisonmode.fr/" },
          { "@type": "ListItem", "position": 2, "name": "Catálogo", "item": "https://maisonmode.fr/catalogo.html" }
        ]
      }
    </script>
  </head>
  <body data-page="catalogo" class="min-h-screen bg-stone-100 text-stone-900 antialiased">
    <a
      class="sr-only focus:not-sr-only focus:fixed focus:left-4 focus:top-4 focus:z-50 focus:rounded-md focus:bg-white focus:px-3 focus:py-2 focus:text-sm focus:font-semibold focus:text-stone-900 focus:shadow"
      href="#main-content"
      >Saltar al contenido principal</a
    >

    <header class="mx-auto w-[min(1200px,calc(100%-2rem))] pt-4 md:pt-6">
      <div id="navbar-root"></div>
    </header>

    <main id="main-content" class="mx-auto w-[min(1200px,calc(100%-2rem))] pb-12 pt-6 md:pb-16 md:pt-8">
      <nav aria-label="Breadcrumb" class="mb-4">
        <ol class="flex list-none items-center gap-2 text-sm text-stone-600">
          <li><a href="index.html">Home</a></li>
          <li aria-hidden="true">/</li>
          <li aria-current="page">Catálogo</li>
        </ol>
      </nav>

      <section class="rounded-3xl border border-stone-200 bg-white p-5 shadow-sm md:p-7" aria-labelledby="catalog-title">
        <h1 id="catalog-title" class="font-serif text-4xl leading-tight md:text-5xl">Colección completa</h1>
        <p class="mt-2 max-w-prose text-sm text-stone-700 md:text-base">
          20 productos seleccionados con estética premium minimalista y enfoque en materiales duraderos.
        </p>
      </section>

      <section class="mt-5 grid gap-4 rounded-2xl border border-stone-200 bg-white p-4 shadow-sm md:grid-cols-2 md:p-5" aria-labelledby="filter-title">
        <h2 id="filter-title" class="sr-only">Filtros</h2>
        <label class="grid gap-1 text-sm font-medium text-stone-700">
          Categoría
          <select
            id="filter-category"
            name="category"
            class="rounded-lg border border-stone-300 bg-white px-3 py-2 text-sm outline-none ring-emerald-700 transition focus-visible:ring-2"
          >
            <option value="all">Todas</option>
            <option value="calzado">Calzado</option>
            <option value="camisas">Camisas</option>
            <option value="pantalones">Pantalones</option>
            <option value="accesorios">Accesorios</option>
          </select>
        </label>
        <label class="grid gap-1 text-sm font-medium text-stone-700">
          Talla
          <select
            id="filter-size"
            name="size"
            class="rounded-lg border border-stone-300 bg-white px-3 py-2 text-sm outline-none ring-emerald-700 transition focus-visible:ring-2"
          >
            <option value="all">Todas</option>
            <option value="S">S</option>
            <option value="M">M</option>
            <option value="L">L</option>
            <option value="XL">XL</option>
          </select>
        </label>
      </section>

      <section class="mt-6" aria-labelledby="products-grid-title">
        <h2 id="products-grid-title" class="sr-only">Productos disponibles</h2>
        <div class="grid grid-cols-2 gap-4 md:grid-cols-3 lg:grid-cols-4" id="products-grid"></div>
      </section>
    </main>

    <footer class="mx-auto w-[min(1200px,calc(100%-2rem))] pb-8">
      <div id="footer-root"></div>
    </footer>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
