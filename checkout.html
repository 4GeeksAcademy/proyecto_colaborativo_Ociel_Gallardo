<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maison Mode Paris | Checkout</title>
    <meta
      name="description"
      content="Checkout seguro en 3 pasos: datos personales, dirección de entrega y pago con tarjeta."
    />
    <link rel="canonical" href="https://maisonmode.fr/checkout.html" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="es_ES" />
    <meta property="og:site_name" content="Maison Mode Paris" />
    <meta property="og:title" content="Maison Mode Paris | Checkout" />
    <meta property="og:description" content="Finaliza tu compra en 3 pasos con formularios claros y accesibles." />
    <meta property="og:url" content="https://maisonmode.fr/checkout.html" />
    <meta property="og:image" content="https://images.unsplash.com/photo-1555529669-e69e7aa0ba9a?auto=format&fit=crop&w=1200&q=80" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Maison Mode Paris | Checkout" />
    <meta name="twitter:description" content="Checkout optimizado para móvil con navegación segura y fluida." />
    <meta name="twitter:image" content="https://images.unsplash.com/photo-1555529669-e69e7aa0ba9a?auto=format&fit=crop&w=1200&q=80" />
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="css/custom-effects.css" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "BreadcrumbList",
        "itemListElement": [
          { "@type": "ListItem", "position": 1, "name": "Home", "item": "https://maisonmode.fr/" },
          { "@type": "ListItem", "position": 2, "name": "Checkout", "item": "https://maisonmode.fr/checkout.html" }
        ]
      }
    </script>
  </head>
  <body data-page="checkout" class="min-h-screen bg-stone-100 text-stone-900 antialiased">
    <a
      class="sr-only focus:not-sr-only focus:fixed focus:left-4 focus:top-4 focus:z-50 focus:rounded-md focus:bg-white focus:px-3 focus:py-2 focus:text-sm focus:font-semibold focus:text-stone-900 focus:shadow"
      href="#main-content"
      >Saltar al contenido principal</a
    >

    <header class="mx-auto w-[min(1200px,calc(100%-2rem))] pt-4 md:pt-6">
      <div id="navbar-root"></div>
    </header>

    <main id="main-content" class="mx-auto w-[min(1200px,calc(100%-2rem))] pb-12 pt-6 md:pb-16 md:pt-8">
      <h1 class="font-serif text-4xl leading-tight md:text-5xl">Checkout</h1>

      <ol class="mt-4 flex flex-wrap gap-2" aria-label="Progreso de checkout">
        <li aria-current="step" class="rounded-full border border-emerald-700 bg-white px-3 py-1 text-xs font-semibold text-emerald-700 md:text-sm">1. Datos personales</li>
        <li class="rounded-full border border-stone-300 bg-white px-3 py-1 text-xs font-semibold text-stone-600 md:text-sm">2. Dirección de entrega</li>
        <li class="rounded-full border border-stone-300 bg-white px-3 py-1 text-xs font-semibold text-stone-600 md:text-sm">3. Pago con tarjeta</li>
      </ol>

      <form id="checkout-form" class="mt-5 grid gap-4" novalidate>
        <fieldset class="grid gap-2 rounded-2xl border border-stone-200 bg-white p-5 shadow-sm">
          <legend class="px-1 font-serif text-2xl">Datos personales</legend>
          <label class="mt-2 text-sm font-medium text-stone-700" for="first-name">Nombre</label>
          <input
            id="first-name"
            name="firstName"
            required
            autocomplete="given-name"
            class="rounded-lg border border-stone-300 bg-white px-3 py-2 text-sm outline-none ring-emerald-700 transition focus-visible:ring-2"
          />

          <label class="text-sm font-medium text-stone-700" for="last-name">Apellidos</label>
          <input
            id="last-name"
            name="lastName"
            required
            autocomplete="family-name"
            class="rounded-lg border border-stone-300 bg-white px-3 py-2 text-sm outline-none ring-emerald-700 transition focus-visible:ring-2"
          />

          <label class="text-sm font-medium text-stone-700" for="email">Email</label>
          <input
            id="email"
            name="email"
            type="email"
            required
            autocomplete="email"
            class="rounded-lg border border-stone-300 bg-white px-3 py-2 text-sm outline-none ring-emerald-700 transition focus-visible:ring-2"
          />
        </fieldset>

        <fieldset class="grid gap-2 rounded-2xl border border-stone-200 bg-white p-5 shadow-sm">
          <legend class="px-1 font-serif text-2xl">Dirección de entrega</legend>
          <label class="mt-2 text-sm font-medium text-stone-700" for="address">Dirección</label>
          <input
            id="address"
            name="address"
            required
            autocomplete="street-address"
            class="rounded-lg border border-stone-300 bg-white px-3 py-2 text-sm outline-none ring-emerald-700 transition focus-visible:ring-2"
          />

          <label class="text-sm font-medium text-stone-700" for="city">Ciudad</label>
          <input
            id="city"
            name="city"
            required
            autocomplete="address-level2"
            class="rounded-lg border border-stone-300 bg-white px-3 py-2 text-sm outline-none ring-emerald-700 transition focus-visible:ring-2"
          />

          <label class="text-sm font-medium text-stone-700" for="postal-code">Código postal</label>
          <input
            id="postal-code"
            name="postalCode"
            required
            autocomplete="postal-code"
            class="rounded-lg border border-stone-300 bg-white px-3 py-2 text-sm outline-none ring-emerald-700 transition focus-visible:ring-2"
          />
        </fieldset>

        <fieldset class="grid gap-2 rounded-2xl border border-stone-200 bg-white p-5 shadow-sm">
          <legend class="px-1 font-serif text-2xl">Pago con tarjeta</legend>
          <label class="mt-2 text-sm font-medium text-stone-700" for="card-number">Número de tarjeta</label>
          <input
            id="card-number"
            name="cardNumber"
            inputmode="numeric"
            required
            aria-describedby="card-note"
            class="rounded-lg border border-stone-300 bg-white px-3 py-2 text-sm outline-none ring-emerald-700 transition focus-visible:ring-2"
          />

          <label class="text-sm font-medium text-stone-700" for="card-expiry">Fecha de expiración</label>
          <input
            id="card-expiry"
            name="cardExpiry"
            placeholder="MM/AA"
            required
            class="rounded-lg border border-stone-300 bg-white px-3 py-2 text-sm outline-none ring-emerald-700 transition focus-visible:ring-2"
          />

          <label class="text-sm font-medium text-stone-700" for="card-cvv">CVV</label>
          <input
            id="card-cvv"
            name="cardCvv"
            inputmode="numeric"
            required
            class="rounded-lg border border-stone-300 bg-white px-3 py-2 text-sm outline-none ring-emerald-700 transition focus-visible:ring-2"
          />

          <p id="card-note" class="text-xs text-stone-600">Pasarela simulada. No se almacenan datos de pago en este prototipo.</p>
        </fieldset>

        <button
          class="inline-flex w-full items-center justify-center rounded-full bg-emerald-700 px-5 py-2.5 text-sm font-semibold text-white transition hover:-translate-y-0.5 hover:bg-emerald-800 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-emerald-700 md:w-fit"
          type="submit"
        >
          Finalizar compra
        </button>
      </form>
    </main>

    <footer class="mx-auto w-[min(1200px,calc(100%-2rem))] pb-8">
      <div id="footer-root"></div>
    </footer>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
