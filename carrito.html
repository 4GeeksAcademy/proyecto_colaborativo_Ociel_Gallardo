<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maison Mode Paris | Carrito</title>
    <meta
      name="description"
      content="Revisa tu carrito en Maison Mode Paris: subtotal, impuestos y total final antes de comprar."
    />
    <link rel="canonical" href="https://maisonmode.fr/carrito.html" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="es_ES" />
    <meta property="og:site_name" content="Maison Mode Paris" />
    <meta property="og:title" content="Maison Mode Paris | Carrito" />
    <meta property="og:description" content="Resumen de compra con subtotal, impuestos y total final." />
    <meta property="og:url" content="https://maisonmode.fr/carrito.html" />
    <meta property="og:image" content="https://images.unsplash.com/photo-1512436991641-6745cdb1723f?auto=format&fit=crop&w=1200&q=80" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Maison Mode Paris | Carrito" />
    <meta name="twitter:description" content="Valida tu pedido antes de pasar al checkout en 3 pasos." />
    <meta name="twitter:image" content="https://images.unsplash.com/photo-1512436991641-6745cdb1723f?auto=format&fit=crop&w=1200&q=80" />
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap"
        rel="stylesheet"
      />
    </noscript>
    <link rel="stylesheet" href="css/tailwind.generated.css" />
    <link rel="stylesheet" href="css/custom-effects.css" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "BreadcrumbList",
        "itemListElement": [
          { "@type": "ListItem", "position": 1, "name": "Home", "item": "https://maisonmode.fr/" },
          { "@type": "ListItem", "position": 2, "name": "Carrito", "item": "https://maisonmode.fr/carrito.html" }
        ]
      }
    </script>
  </head>
  <body data-page="carrito" class="min-h-screen bg-stone-100 text-stone-900 antialiased">
    <a
      class="sr-only focus:not-sr-only focus:fixed focus:left-4 focus:top-4 focus:z-50 focus:rounded-md focus:bg-white focus:px-3 focus:py-2 focus:text-sm focus:font-semibold focus:text-stone-900 focus:shadow"
      href="#main-content"
      >Saltar al contenido principal</a
    >

    <header class="mx-auto w-[min(1200px,calc(100%-2rem))] pt-4 md:pt-6">
      <div id="navbar-root"></div>
    </header>

    <main id="main-content" class="mx-auto w-[min(1200px,calc(100%-2rem))] pb-12 pt-6 md:pb-16 md:pt-8">
      <h1 class="font-serif text-4xl leading-tight md:text-5xl">Tu carrito</h1>
      <div class="mt-5 grid gap-5 md:grid-cols-[1.6fr_.9fr]">
        <section aria-labelledby="cart-items-title">
          <h2 id="cart-items-title" class="mb-3 font-serif text-2xl">Productos seleccionados</h2>
          <div class="grid gap-3" id="cart-items"></div>
        </section>

        <aside class="sticky top-6 rounded-2xl border border-stone-200 bg-white p-5 shadow-sm" aria-labelledby="summary-title">
          <h2 id="summary-title" class="font-serif text-2xl">Resumen</h2>
          <dl class="mt-3 space-y-2 text-sm md:text-base">
            <div class="flex items-center justify-between gap-3">
              <dt>Subtotal</dt>
              <dd id="cart-subtotal" class="font-semibold">0,00 EUR</dd>
            </div>
            <div class="flex items-center justify-between gap-3">
              <dt>Impuestos</dt>
              <dd id="cart-tax" class="font-semibold">0,00 EUR</dd>
            </div>
            <div class="flex items-center justify-between gap-3 border-t border-stone-200 pt-2">
              <dt>Total final</dt>
              <dd id="cart-total" class="text-lg font-bold text-emerald-700">0,00 EUR</dd>
            </div>
          </dl>
          <a
            class="mt-4 inline-flex w-full items-center justify-center rounded-full bg-emerald-700 px-5 py-2.5 text-sm font-semibold text-white transition hover:-translate-y-0.5 hover:bg-emerald-800 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-emerald-700"
            href="checkout.html"
            >Comprar</a
          >
        </aside>
      </div>
    </main>

    <footer class="mx-auto w-[min(1200px,calc(100%-2rem))] pb-8">
      <div id="footer-root"></div>
    </footer>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
